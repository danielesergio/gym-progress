# ==============================================================================
# VARIANTI SETTIMANALI (riferimento per gli altri giorni)
# ==============================================================================
varianti_proteina_principale:
  - giorno: "Lunedi (Allenamento)"
    pranzo: "Petto di pollo"
    cena: "Salmone"
  - giorno: "Martedi (Riposo)"
    pranzo: "Petto di tacchino"
    cena: "Merluzzo o Orata"
  - giorno: "Mercoledi (Allenamento)"
    pranzo: "Manzo magro (girello o scamone)"
    cena: "Tonno fresco o sgombro"
  - giorno: "Giovedi (Riposo)"
    pranzo: "Uova + legumi"
    cena: "Pollo o tacchino"
  - giorno: "Venerdi (Allenamento)"
    pranzo: "Salmone"
    cena: "Manzo magro"
  - giorno: "Sabato (Riposo)"
    pranzo: "Pesce spada o tonno"
    cena: "Pollo"
  - giorno: "Domenica (Riposo)"
    pranzo: "Carne bianca mista o brodo osseo con carne"
    cena: "Uova + verdure abbondanti"

note_varianti: >
  Ruotare le fonti proteiche durante la settimana per garantire un profilo aminoacidico
  completo e varieta di micronutrienti. Pesce grasso (salmone, sgombro, sardine) almeno
  3 volte/settimana per gli omega-3 EPA e DHA, critici per l anti-infiammazione del TOS.
  Carne rossa magra (girello, scamone, controfiletto) 2 volte/settimana per ferro e zinco.
  Uova: fonte proteica completa e versatile, 3-4 a colazione o come fonte principale
  in un pasto di riposo. Legumi (lenticchie, ceci, fagioli) come fonte proteica vegetale
  2 volte/settimana, ottimi per fibra e micronutrienti.

# ==============================================================================
# INTEGRATORI
# ==============================================================================
integratori:
  - nome: "Vitamina C"
    dose: "500-1000 mg"
    timing: "mattina con colazione"
    note: >
      Fondamentale per la sintesi del collagene e la guarigione del TOS. La vitamina C
      e cofattore essenziale della prolilidrossilasi, enzima chiave per la formazione
      del collagene stabile. Preferire forma tampona ta (sodio ascorbato) per evitare
      irritazione gastrica. Assumere anche da fonti alimentari: kiwi, peperoni, agrumi.

  - nome: "Omega-3 (EPA + DHA)"
    dose: "2-3 g totali di EPA+DHA"
    timing: "con i pasti (es. pranzo + cena)"
    note: >
      Potente azione anti-infiammatoria, supporto alla guarigione del tessuto connettivo.
      Se si consumano 3 porzioni settimanali di pesce grasso (salmone, sgombro, sardine)
      la dose puo essere ridotta a 1-2 g supplementari. Scegliere olio di pesce purificato
      (certificato IFOS) per evitare contaminanti.

  - nome: "Collagene idrolizzato (tipo I e III)"
    dose: "10-15 g"
    timing: "30-60 minuti prima dell allenamento o al mattino a digiuno"
    note: >
      L assunzione pre-allenamento con vitamina C aumenta la sintesi di collagene nel
      tessuto connettivo stimolata dal carico meccanico (studio Shaw et al., 2017).
      Particolarmente indicato per la guarigione del TOS (tendini, fascia, capsula).
      In alternativa: brodo osseo fatto in casa (250 ml = ~10 g collagene naturale).

  - nome: "Vitamina D3 + K2"
    dose: "2000-4000 UI D3 + 100 mcg K2"
    timing: "con il pasto piu ricco di grassi (pranzo o cena)"
    note: >
      Essenziale per la funzione muscolare, la sintesi proteica e la risposta immunitaria.
      In Australia la carenza e meno comune rispetto al Nord Europa, ma monitorare i livelli
      con esame del sangue (target 25-OH-D: 50-80 ng/ml). La K2 (MK-7) ottimizza
      l utilizzo del calcio e riduce la calcificazione ectopica.

  - nome: "Magnesio glicinato o malato"
    dose: "300-400 mg"
    timing: "sera, 30-60 minuti prima di dormire"
    note: >
      Supporto al recupero muscolare, qualita del sonno e riduzione della risposta
      infiammatoria. Il magnesio glicinato e meglio tollerato a livello gastrointestinale
      rispetto all ossido. Utile per gestire il cortisolo durante la fase cut.

  - nome: "Creatina monoidrato"
    dose: "5 g"
    timing: "dopo l allenamento (o con qualsiasi pasto nei giorni di riposo)"
    note: >
      Supporto alla forza e al volume muscolare durante la fase cut per limitare
      la perdita di performance. La creatina e sicura e ben studiata. Non richiede
      fase di carico: 5 g/giorno costanti sono sufficienti per saturare i depositi
      muscolari in 3-4 settimane. Sciogliere in acqua o succo di frutta.

  - nome: "Zinco"
    dose: "15-25 mg"
    timing: "sera con cena"
    note: >
      Cofattore per oltre 300 enzimi, inclusi quelli coinvolti nella sintesi proteica
      e nella risposta immunitaria. Importante per la guarigione tissutale. Non assumere
      a stomaco vuoto (nausea). Non superare 40 mg/giorno totali (incluse fonti alimentari).

note_finali_dieta: >
  IDRATAZIONE: minimo 2.5 litri di acqua al giorno. Nei giorni di allenamento portare
  a 3-3.5 litri. Distribuire l apporto idrico durante la giornata (non bere grandi
  quantita in una sola volta). L acqua e fondamentale per il metabolismo del tessuto
  connettivo e per la lubrificazione articolare — critica durante il recupero TOS.

  PREPARAZIONE ALIMENTI: preferire cotture leggere (vapore, forno, griglia, saltato
  con poco olio). Evitare fritture. Per le carni usare marinature con aglio, limone,
  curcuma, zenzero — tutti con proprieta anti-infiammatorie.

  FLESSIBILITA: i pasti possono essere adattati agli orari della giornata. Se l
  allenamento e serale, spostare i carboidrati pre-workout alla merenda (16:30) e
  il pasto post-workout alla cena (21:00). La priorita assoluta e raggiungere il
  target proteico giornaliero (192 g). Le calorie e i carboidrati hanno una tolleranza
  di +/- 150 kcal senza impatto significativo sul progresso settimanale.

  MONITORAGGIO: pesarsi ogni 7-10 giorni, stessa ora (mattino a digiuno, dopo bagno).
  Il peso puo oscillare di 1-2 kg giorno per giorno per idratazione e glicogeno:
  valutare la media delle pesate, non il singolo valore. Target: -0.3/0.5 kg/settimana
  per mantenere la massa muscolare durante il cut.
