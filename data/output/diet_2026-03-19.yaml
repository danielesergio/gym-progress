  note_strategia: >
    Fase CUT con deficit moderato di 250 kcal rispetto al TDEE (2886 kcal).
    Proteine elevate a 2.2 g/kg di massa magra (192 g/giorno) per preservare la massa
    muscolare e supportare la guarigione della Sindrome TOS (piccolo pettorale).
    Grassi mantenuti a circa 1 g/kg di peso corporeo (87 g/giorno) per garantire la
    produzione ormonale ottimale e favorire i processi anti-infiammatori.
    Carboidrati ciclizzati: piu' alti nei giorni di allenamento (287 g) per supportare
    la performance e il recupero, ridotti nei giorni di riposo (257 g).
    Alimenti anti-infiammatori prioritari: pesce grasso (omega-3), frutti rossi,
    curcuma, zenzero, verdure a foglia verde. Vitamina C da fonti alimentari e
    integratori per supportare la sintesi del collagene. Brodo osseo o collagene
    idrolizzato consigliato per il recupero tendineo e capsulare.
    Idratazione minima 2.5 litri di acqua al giorno, aumentare a 3 litri nei giorni
    di allenamento. Distribuzione proteica uniforme: 35-40 g per pasto su 5 pasti.
    Timing carboidrati: concentrare la quota maggiore attorno all allenamento
    (pre e post) per ottimizzare performance e recupero muscolare.

