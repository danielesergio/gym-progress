integratori:
  - nome: "Creatina monoidrato"
    dose: "5g"
    timing: "mattino con colazione (giorni di riposo) oppure subito dopo l'allenamento (giorni di allenamento)"
    note: "Sciogliere in acqua o succo di frutta. Assumere tutti i giorni senza interruzioni, inclusa la fase di recupero TOS. Non necessario il loading."
  - nome: "Vitamina D3"
    dose: "2000 UI"
    timing: "con il pranzo"
    note: "Importante per la guarigione muscolare e ossea durante il recupero TOS. Aumentare a 4000 UI in caso di carenza documentata (esame 25-OH vitamina D < 30 ng/mL)."
  - nome: "Omega-3 (EPA+DHA)"
    dose: "2-3g EPA+DHA totali"
    timing: "suddivisi tra pranzo e cena (es. 1g + 2g)"
    note: "Effetto antinfiammatorio specificamente utile per la sindrome TOS e per il recupero muscolare in generale. Scegliere prodotto con almeno 60% EPA+DHA sul totale. Assumere con i pasti grassi per migliore assorbimento."
  - nome: "Proteina Whey"
    dose: "60g/die (25g colazione + 35g merenda)"
    timing: "colazione e post-allenamento — solo nei giorni di allenamento"
    note: "Nei giorni di riposo non necessaria se l'alimentazione solida raggiunge il target proteico (~191g). Preferire isolato o concentrato certificato. Controllare l'assenza di lattosio in caso di sensibilita'."
