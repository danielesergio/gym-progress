  note_strategia: |
    Fase 0 — Recupero TOS (Thoracic Outlet Syndrome). Strategia di mantenimento calorico calibrato
    sul TDEE stimato di 2870 kcal (87.2 kg, attivita' moderata + 10-12k passi/die).
    Nessun deficit significativo: il cut aggressivo comprometterebbe la guarigione muscolare e i
    progressi di forza. Giorni di allenamento (+274 kcal vs riposo) con carboidrati piu' elevati
    per supportare le sessioni consentite in fase di recupero (squat, stacco, core, mobilita').
    Proteine a 2.35 g/kg (~205g/die) per massimizzare la sintesi proteica durante la guarigione.
    Grassi mantenuti tra 82-92g/die, privilegiando salmone, noci e olio EVO per l'effetto
    antinfiammatorio utile alla risoluzione della TOS. Whey protein inclusa nella colazione e nella
    merenda dei giorni di allenamento per facilitare il raggiungimento del target proteico.
    Il saldo calorico medio settimanale risulta leggermente sotto il TDEE (3 giorni allenamento
    + 4 riposo = ~2710 kcal/die vs TDEE 2870), compensato passivamente dalla camminata 10-12k passi.
    BF attuale stimato 17.1%: monitorare vita ombelico mensilmente. Se a luglio 2026 vita > 93 cm
    o BF > 17% confermato, valutare deficit moderato -300 kcal prima della fase 4 (estate).
    Idratazione: 2.5 L acqua/die nei giorni di riposo, 3 L nei giorni di allenamento.

