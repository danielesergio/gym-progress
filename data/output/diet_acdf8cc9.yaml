meta:
  data: "2026-03-23"
  fase: "mantenimento"
  kcal_allenamento: 2850
  kcal_beach_volley: 3100
  kcal_riposo: 2650
  kcal_sgarro: 2750
  proteine_g: 185
  carboidrati_g: 320
  grassi_g: 80
  note_strategia: >
    FASE MANTENIMENTO (rehab TOS): il TDEE calcolato e' 2850 kcal/die (BMR 1839 x 1.55).
    L'analisi automatica suggerisce 2850 kcal senza modifiche, e concordo con questa indicazione.
    La fase di mantenimento e' corretta durante il recupero dall'infortunio TOS per preservare
    massa magra e favorire la guarigione dei tessuti. Non applico deficit per evitare di
    compromettere il recupero, ne' surplus perche' l'attivita' e' ridotta (3 sessioni/sett rehab leggero).
    GIORNO ALLENAMENTO PESI (~2850 kcal): target pari al TDEE. I carboidrati sono concentrati
    a pranzo e cena per supportare il recupero post-allenamento. Proteine distribuite su 4 pasti
    (35-55g per pasto) per massimizzare la sintesi proteica.
    GIORNO BEACH VOLLEY (~3100 kcal): TDEE + 250 kcal per compensare il dispendio da 90 minuti
    di beach volley a intensita' media (~250-300 kcal aggiuntive). Carboidrati aumentati per
    supportare l'attivita' prolungata.
    GIORNO RIPOSO (~2650 kcal): TDEE - 200 kcal. Riduzione moderata dei carboidrati, proteine
    e grassi mantenuti stabili per favorire il recupero.
    GIORNO SGARRO (~2750 kcal): circa TDEE - 100 kcal. Il pasto sgarro (pizza) copre buona parte
    delle calorie, la cena e' piu' leggera per compensare. Mantengo 1 sgarro a settimana per
    aderenza psicologica alla dieta.
    PROTEINE: 2.1-2.5 g/kg (180-215g/die) — fascia alta per atleta di forza in fase di
    mantenimento con rehab, dove la sintesi proteica per riparazione tissutale e' prioritaria.
    L'aderenza dieta non e' dichiarata (attendibilita' 70%), quindi ho preferito un piano
    semplice con pasti ripetitivi e facili da preparare, in linea con le preferenze dell'atleta.
    BF% attuale 17.1%: sopra il target del 13%, ma il cut e' correttamente posticipato
    al mesociclo 3 (post-rehab). Durante il rehab la priorita' e' guarigione, non dimagrimento.

