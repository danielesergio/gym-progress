integratori:
  - nome: "Creatina monoidrata"
    dose: "5g"
    timing: "dopo allenamento, con acqua o succo di frutta"
    note: "Assumere ogni giorno, anche nei giorni di riposo, per mantenere la saturazione muscolare. Nei giorni senza allenamento assumere a qualsiasi orario."
  - nome: "Proteine whey cioccolato"
    dose: "30-35g di polvere"
    timing: "post-allenamento o come spuntino serale"
    note: "Utilizzare con latte parzialmente scremato (300ml) per aumentare il profilo aminoacidico e le calorie, oppure con acqua per versione piu' leggera. Utile per raggiungere il target proteico giornaliero di 180-190g. Conteggiato nello slot spuntino_sera."
