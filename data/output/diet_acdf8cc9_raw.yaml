meta:
  data: "2026-03-28"
  fase: "mantenimento"
  tipi_giorno:
    - id: "riposo"
      label: "Giorno di Riposo"
      kcal_target: 2650
      macros_target:
        proteine: 180
        carboidrati: 295
        grassi: 75
    - id: "palestra"
      label: "Giorno Allenamento Pesi"
      kcal_target: 2850
      macros_target:
        proteine: 185
        carboidrati: 330
        grassi: 78
    - id: "beach_volley"
      label: "Giorno Beach Volley (giovedi)"
      kcal_target: 3150
      macros_target:
        proteine: 190
        carboidrati: 390
        grassi: 82

  note_strategia: >
    FASE CORRENTE: Mantenimento calorico (Mesociclo 2 - Rehab TOS Fase 2, ramp-up).
    L'atleta e' in recupero da sindrome TOS e non e' opportuno creare deficit che
    comprometterebbe la guarigione tissutale e la massa magra.

    BASE CALORICA: TDEE 2850 kcal (BMR 1839 x 1.55) dall'ultima misurazione (2026-03-27).
    L'analisi automatica non e' disponibile per insufficienza di dati (solo 2 misurazioni),
    quindi si parte direttamente dal TDEE calcolato.

    GIORNO RIPOSO (2650 kcal): Riduzione di 200 kcal rispetto al TDEE base.
    L'atleta cammina 10000-12000 passi/die quindi il dispendio non e' zero,
    ma il deficit leggero e' giustificato dalla minore attivita' strutturata.
    Carboidrati ridotti, proteine e grassi stabili.

    GIORNO PALESTRA (2850 kcal): Target TDEE base esatto. Prevalenza carboidrati
    per supportare le sessioni di allenamento in fase rehab (anche se leggere).
    Carboidrati concentrati attorno all'allenamento (pranzo o cena post-workout).

    GIORNO BEACH VOLLEY (3150 kcal): TDEE + 300 kcal per compensare 90 minuti
    di beach volley a intensita' media (stima consumo aggiuntivo 350-450 kcal).
    Si arrotonda a +300 kcal per non eccedere il mantenimento. Carboidrati
    significativamente aumentati per sostenere l'attivita' sportiva.

    PROTEINE: 180-190 g/die (2.1-2.2 g/kg su 85.9 kg). Valore alto per:
    (1) preservare massa magra durante il periodo di attivita' ridotta,
    (2) supportare la guarigione del tessuto connettivo (TOS),
    (3) coerenza con la fase di mantenimento.

    STRUTTURA PASTI: 4 pasti principali come da preferenza atleta (colazione, pranzo,
    cena, + spuntino pomeriggio/sera o tra colazione e pranzo).
    Colazione abbondante (preferenza esplicita). Pranzo e cena calibrati ma non
    eccessivamente voluminosi. Lo spuntino opzionale tra colazione e pranzo
    (datteri e mandorle/noci) e' trattato come slot separato con 1-2 opzioni.

    LINEE GUIDA NUTRIZIONALI rispettate:
    - Frutta distribuita tra colazione e pasti (3 frutti/die)
    - Verdura presente a pranzo e cena
    - Cereali integrali preferiti (pasta integrale, riso)
    - Pesce ~3 volte/settimana nelle opzioni cena
    - Carne ~3 volte/settimana alternata a legumi, pesce, uova, formaggi
    - Legumi 2-3 volte/settimana a pranzo (minestre, zuppe)
    - Yogurt greco ogni giorno a colazione
    - Formaggi (mozzarella, parmigiano) come secondo 2 volte/settimana
    - Uova 1 volta/settimana come secondo
    - Affettati ridotti al minimo (esclusi dalle opzioni principali)
    - Niente pasti sgarro nelle opzioni (pizza/hamburger esclusi)

    INTERCAMBIABILITA': Le opzioni di ogni slot sono calibrate per avere kcal
    simili (tolleranza +/-50 kcal) per ciascun tipo di giorno. Il postprocessing
    Python ricalcolera' grammi e macro esatti scalando gli alimenti.

    INTEGRATORI: Proteine whey cioccolato con latte parzialmente scremato come
    spuntino serale opzionale o post-allenamento. Creatina monoidrata 5g/die
    dopo allenamento. Nessun altro integratore necessario.

