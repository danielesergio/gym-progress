# Feedback Atleta  # Aprile 2026
# Compila i campi lasciando i valori dopo i ':'. Lascia null se non disponibile.

sensazioni:
  energia_generale:   # numero 1-10
  qualita_sonno:      # numero 1-10
  stress:             # basso / medio / alto

allenamento:
  seguito_scheda:     # si / parzialmente / no
  esercizi_pesanti:
  esercizi_difficili:
  note:

dieta:
  seguita:            # si / parzialmente / no
  kcal_media_stimata: # es. 2200 — media kcal effettive consumate al giorno (lascia vuoto se non sai)
  difficolta:
  note:
    - 1 opzione per colazione
    - 1 o 2 opzioni per spuntini
    - 7 opzioni per pranzo
    - 7 opzioni per cena
    - i pasti sgarro non introdurli nelle opzioni
    - non mettere sempre carne nei pranzi
    - non mettere proteine nei pasti principali
    - usa pasta integrale
    - cerca di rispettare le line guida della nutrizione
      - FRUTTA	3 frutti al giorno grandi come il pugno di ciascuno
      - VERDURA	2 porzioni di verdura al giorno, più frequentemente cruda
      - CEREALI	ogni giorno ed a ogni pasto, pasta o riso o mais, ecc. meglio se integrali
      - PESCE	3 volte a settimana
      - CARNE ROSSA O BIANCA	3 volte a settimana
      - 1-2 UOVA	1 volta a settimana al posto della carne
      - AFFETTATI	prosciutto crudo o cotto e bresaola 2 volte a settimana con moderazione
      - INSACCATI	Salame, mortadella, salsiccia, wurstel e similari 1 volta a settimana con moderazione
      - LEGUMI	2-3 volte a settimana
      - LATTE O YOGURT	1-2 volte al giorno
      - FORMAGGI COME SECONDO	Stagionati come il Grana Padano DOP 2 volte a settimana 50/60g oppure freschi 100g al posto di carne o uova
    - cerca di creare pasti con marco simili tra di loro nelle stesse categorie
    - cerca di evitare gli affettati e mantenere i pasti semplici senza troppi alimenti.
    - A colazione di solito mangio 150gr di yogurt greco allo 0% con 30 gr di muslei proteico ( Muslei proteico = 108kcal, 1,65 grassi, carbo 13,6 ( zuccheri 3,3), 8.88 proteine) se necessario integra con qualcos'altro o cambia le dosi.
    - Alla sera mi piacerebbe mangiare petto di pollo / filetto / pesce (salmone, trota, branzino, tonno (anche in scatola) / mozzarella / uova.
    - Ogni tanto faccio una merenda aggiuntiva (tra colazione e pranzo) con datteri e mandorle o noci.
    - A pranzo di solito mangio pasta (al sugo pomodoro, pesto, carbonara) alternati a giorni con minestra di verderue/piselli/lenticchie/fagioli bianchi o borlotti accompagnati con una banana. è possibili avere 1 o 2 pasti sgarro (pizza, hamburger fuori)?
    - prendo spesso proteine whey o proteine isolate al gusto cioccolato (con latte parzialmente scremato o acqua).
    - unici integratori che voglio proteine e creatina, se necessari
    - se serve un altro pasto aggiuntivo vorrei che fosse super semplice (frutto + proteine whey). Preferisco una colazione abbondate e pranzo e cena non troppo voluminosi.
