meta:
  atleta: "Daniele"
  data_aggiornamento: "2026-03-19"
  orizzonte_mesi: 12

situazione:
  infortunio: "Sindrome TOS da infiammazione/contrattura del piccolo pettorale (in guarigione, fermo 3 settimane)"
  note: >
    Atleta di livello intermedio (38 anni, 4 anni palestra + 30 anni sport), attualmente in fase
    CUT con BF 17.1% target <=13%. Massimali attuali solidi ma penalizzati da TOS: la panca e'
    ferma da oltre un anno (115 kg da nov 2024 a ott 2025, ora stimata 117 con Epley). Storico
    discontinuo nel 2024 (Australia) con cali di performance su squat e stacco. Il piano prevede
    una fase di recupero/rientro conservativa di 8 settimane, seguita da un blocco di forza-base
    adattato (senza esercizi controindicati), e successivamente il reintegro progressivo degli
    esercizi compound completi. La fase cut dura circa 4-5 mesi prima di tornare a mantenimento
    o bulk. La progressione attesa e' vincolata ai rate storici corretti per eta', infortunio e cut.
  trend_recente: >
    Attenzione: da ott 2025 a mar 2026 si registra un trend negativo su stacco (-2 kg, da 200 a 198)
    e massa magra (-1.2 kg, da 73.5 a 72.3 kg), attribuibile al fermo per TOS e al deficit calorico.
    Indicatore di successo delle fasi 1-2: ritorno ai livelli di ott 2025 (stacco 200 kg, MM 73.5 kg)
    prima di puntare a nuovi record.

massimali_attuali:
  squat: 146
  panca: 117
  stacco: 198

target_corporeo:
  peso_kg: 95
  bf_pct_max: 13
  note: "Obiettivo finale a 2-5 anni: 95 kg a BF <=13%. Attualmente a 87.2 kg, 17.1% BF. Richiede accumulo di ~10 kg massa magra."

target:
  - orizzonte: "6 mesi"
    data: "2026-09-01"
    squat: 151
    panca: 119
    stacco: 207
    note: >
      Rate corretti applicati: squat +10.7 kg/anno, panca +4.8 kg/anno, stacco +17.6 kg/anno.
      Fattori correttivi gia' inclusi: TOS panca -30%, cut -20%, eta' >35 -10%.
      Target conservativi ma realistici considerando 3 settimane di fermo e rientro graduale.
  - orizzonte: "12 mesi"
    data: "2027-03-01"
    squat: 157
    panca: 122
    stacco: 216
    note: >
      Proiezione a 12 mesi con gli stessi rate corretti. Assume guarigione completa TOS entro
      mese 3-4 e reintegro progressivo della panca. Se guarigione piu' rapida del previsto,
      la panca potrebbe superare il target. Lo squat rimane il lift piu' performante.

fasi:
  - numero: 1
    nome: "Recupero e rientro TOS"
    durata_settimane: 8
    obiettivo: >
      Recupero completo dall'infortunio TOS, mantenimento della forza su squat e stacco,
      rinforzo muscolare compensatorio (rotatori esterni, trapezio medio-inferiore, core).
      Nessuna perdita significativa di forza sui lift non coinvolti.
    metodologia: >
      Allenamento 3-4 giorni/settimana. Squat e stacco con carichi al 70-80% 1RM, volume
      moderato (3-4x5). Eliminazione totale di: panca piana, trazioni, lat machine, military
      press, dip, qualsiasi esercizio che stira o attiva intensamente il piccolo pettorale.
      Sostituzione con: rowing seduto (gomiti stretti), face pull, Y-W-T raises, curl, tricipiti ai cavi.
      I push-up stretti sono spostati alla fase 2 (dopo valutazione fisioterapica settimana 8).
      Cut nutrizionale moderato continuato (-250 kcal).
    note: >
      PRIORITA' ASSOLUTA alla guarigione. Nessun compromesso sulla lista degli esercizi vietati.
      Consultare fisioterapista per valutazione settimana 4. Eventuale reintegro parziale di
      esercizi solo con via libera medica. RPE massimo 7-8 su tutti i movimenti.

  - numero: 2
    nome: "Forza Base - Rientro Progressivo"
    durata_settimane: 8
    obiettivo: >
      Ricostruzione della base di forza su tutti e tre i big lift con reintegro graduale
      degli esercizi compound per il tronco superiore. Obiettivo intermedio: squat 148 kg,
      stacco 205 kg, panca (se guarita) 117 kg.
    metodologia: >
      Allenamento 4 giorni/settimana (Upper/Lower o Push/Pull/Legs+Upper). Intensita'
      75-82% 1RM, volume 4x5 sui compound principali (ramping verso il top set).
      Reintegro della panca solo se TOS guarito e con progressione da zero (40-60 kg),
      privilegiando varianti sicure: panca con manubri, panca inclinata con manubri, push-up
      prima del bilanciere. Stacco e squat con progressione lineare settimanale (+2.5 kg).
      Cut completata intorno alla settimana 4-6 di questa fase (BF stimato ~13-14%).
      Eventuale transizione a mantenimento calorico da settimana 6-8.
    note: >
      Valutare all'inizio della fase la condizione del TOS. Se non ancora guarito,
      prolungare il protocollo della fase 1 per altri 2-4 settimane su Upper body.
      Test massimali previsto alla fine della fase (settimana 16 totale).

  - numero: 3
    nome: "Ipertrofia Funzionale"
    durata_settimane: 8
    obiettivo: >
      Aumento della massa muscolare funzionale per supportare i carichi futuri di forza.
      Target BF mantenuto <=14%, leggero surplus calorico (+150-200 kcal se BF lo consente.
      Sviluppare volumi muscolari carenti: spalle posteriori, trapezio, glutei, femorali.
    metodologia: >
      Allenamento 4 giorni/settimana. Scheda Upper/Lower con enfasi su ipertrofia:
      8-12 reps per gli accessori, 4-6 reps per i compound principali.
      Volume settimanale: 14-18 serie per gruppo principale. MAV progressivo tra settimane.
      Inclusi: panca piana con bilanciere (se TOS guarito), trazioni assistite con progressione
      verso libere, rematore bilanciere, military press con manubri, squat e stacco.
      Tecnica di ramping: 3 serie di riscaldamento + top set + back-off set.
    note: >
      Fase chiave per la composizione corporea. Se BF risale sopra 15%, tornare a deficit
      moderato. La panca viene reintegrata completamente in questa fase se guarigione confermata.

  - numero: 4
    nome: "Forza Avanzata - Peaking"
    durata_settimane: 8
    obiettivo: >
      Massimizzare la forza sui 3 big lift verso i target a 12 mesi. Squat 155+ kg,
      panca 120+ kg, stacco 214+ kg. Test massimali alla fine della fase.
    metodologia: >
      Allenamento 4 giorni/settimana. Periodizzazione ondulante (DUP): giorno forza
      (3-5 reps, 85-90% 1RM) alternato a giorno volume (6-8 reps, 75-80% 1RM).
      Deload nella settimana 7. Test 1RM nella settimana 8 su tutti i big lift.
      Focus su tecnica e efficienza del gesto. RPE gestito: 7-8 nelle prime 6 settimane,
      9 nella settimana del peaking, deload a RPE 6, test RPE 10.
    note: >
      Nutrizione: mantenimento calorico (proteina >=2 g/kg). Se BF <=13% considerare
      leggero surplus (+200 kcal) per massimizzare la forza nel picco.
      Questa fase conclude il piano a 12 mesi e stabilisce la base per l'anno successivo.

  - numero: 5
    nome: "Transizione e Pianificazione Anno 2"
    durata_settimane: 20
    obiettivo: >
      Consolidamento risultati del peaking, gestione imprevisti e pianificazione strutturata
      del secondo anno verso i target a lungo termine (squat 200 kg, panca 150 kg, stacco 250 kg).
    metodologia: >
      Suddivisa in 3 sotto-fasi indicative:
      [5a] Recupero attivo post-test (4 settimane): volume ridotto, RPE massimo 7, focus su
      tecnica e recupero. Allenamento 3 giorni/settimana.
      [5b] Accumulo ipertrofico (8 settimane): leggero surplus calorico (+200 kcal se BF <=13%),
      volume moderato-alto, reintegro completo di tutti i compound. Eventuale mini-cut se BF
      risale sopra 15%. Allenamento 4 giorni/settimana.
      [5c] Forza-base anno 2 (8 settimane): ripresa della periodizzazione lineare per preparare
      il secondo ciclo annuale. Rivalutazione massimali e revisione piano per anno 2.
    note: >
      La struttura sotto-fasi e' indicativa: le schede dettagliate verranno generate iterazione
      per iterazione in base ai feedback dell'atleta. La suddivisione aiuta a mantenere
      direzione e aderenza, evitando il rischio di discontinuita' documentato nello storico.

strategia_nutrizionale:
  fase_attuale: "cut"
  deficit_kcal: 250
  kcal_target: 2636
  proteine_g_per_kg: 2.2
  proteine_g_totali: 192
  note_strategia: >
    Deficit moderato di 250 kcal (TDEE 2886 - 250 = 2636 kcal) per preservare la massa
    muscolare durante il recupero dall'infortunio. Deficit aggressivo controindicato durante
    la fase TOS: il tessuto connettivo necessita di nutrienti adeguati per la guarigione.
    Proteine elevate (2.2 g/kg = ~192 g/giorno) per prevenire catabolismo muscolare.
    Cut stimata 4-5 mesi per passare da BF 17.1% a ~13-14% (-4 kg di grasso netto circa).
    Trigger transizione a mantenimento: BF <=13.5% confermato con misurazioni.
    Trigger bulk futuro: BF <=12% e TOS completamente guarito e forza stabilizzata.
    Obiettivo corporeo finale (2-5 anni): 95 kg a BF <=13% richiede accumulo di ~10 kg
    di massa magra aggiuntiva (attuale 72.3 kg MM → target ~82.7 kg MM; FFMI da 20.0 a ~22.8).
    Traguardo ambizioso ma raggiungibile in 2-3 anni con progressione costante e assenza di infortuni.

rischi:
  - area: "Piccolo pettorale / TOS"
    livello: "alto"
    azione: >
      Evitare in fase 1 e 2 (prime 16 settimane): panca piana con bilanciere, trazioni,
      lat machine, military press con bilanciere, dip, qualsiasi esercizio con
      abduzione/flessione della spalla sotto carico. Consultare fisioterapista in settimana
      4 e 8. Reintegro della panca solo con valutazione medica positiva. In caso di
      recidiva, prolungare la fase 1 di 2-4 settimane.
  - area: "Lombare / Stacco"
    livello: "medio"
    azione: >
      Monitorare la tecnica dello stacco: schiena neutra, attivazione core prima del tiro.
      Includere esercizi di rinforzo lombare (good morning leggeri, hyperextension, bird-dog).
      Se comparsa di dolore lombare acuto, sostituire stacco convenzionale con stacco sumo
      o romanian deadlift a carichi ridotti. Non superare RPE 8 sullo stacco nelle fasi 1-2.
  - area: "Regressione da discontinuita'"
    livello: "medio"
    azione: >
      Storico evidenzia cali di performance durante periodi di discontinuita' (Australia 2024).
      Pianificare schede di allenamento casalingo per periodi di viaggio o impossibilita'
      di accesso alla palestra. Mantenere minimo 2 sessioni/settimana anche in periodi
      difficili per limitare il decondizionamento.
  - area: "Stagnazione panca"
    livello: "medio"
    azione: >
      La panca e' ferma da oltre un anno (115 kg da nov 2024 a ott 2025) prima del TOS.
      Alla ripresa, privilegiare varianti che rinforzano i punti deboli tecnici: close grip
      bench, floor press, pin press. Includere lavoro specifico su tricipiti e deltoidi
      anteriori. Valutare la tecnica con video analisi al rientro.
  - area: "Composizione corporea / Bulk prematuro"
    livello: "basso"
    azione: >
      Non avviare una fase di bulk prima di aver raggiunto BF <=13%. Un bulk a BF 17%
      porterebbe a accumulo di grasso eccessivo con benefici minimi sulla forza.
      Monitorare BF mensilmente con le stesse metodologie (misurazioni antropometriche).
