  data: "2026-03-19"
  tipo: "workout"
  valutazione: 8
  esito: "APPROVATA"

problemi_critici: []

suggerimenti:
  - id: "S1"
    descrizione: "Push-up stretti inseriti in settimana 2, il piano approvato li prevede dalla settimana 4-5"
    motivazione: >
      Il piano a lungo termine (fase 1) indica il reintegro dei push-up stretti solo dalla settimana 4-5
      se indolori. La scheda li inserisce gia' dalla settimana 2. Anche se l'alternativa (estensioni
      tricipiti al cavo) e' prevista e la condizione e' restrittiva ('completamente indolore alla
      palpazione'), anticipare il reintegro rispetto al piano potrebbe creare un precedente di fretta.
      Non e' critico perche' l'alternativa e' esplicita e il carico e' a corpo libero.
    proposta: >
      Rimuovere il push-up stretto dal Giorno B settimana 2 e sostituirlo direttamente con estensioni
      tricipiti al cavo (3x12, 30 kg). Reintrodurre il push-up stretto nella scheda successiva
      (settimane 3-4) come previsto dal piano, previa valutazione fisioterapista.

  - id: "S2"
    descrizione: "Push-up stretto menzionato nel titolo del Giorno B S2 ma assente dalla lista esercizi"
    motivazione: >
      Il titolo del Giorno B settimana 2 cita 'Push-up Stretti (se indolore)' e la nota del French press
      dice 'Se presente il push-up stretto, ridurre a 2 serie', ma l'esercizio non compare effettivamente
      nella lista. Questo crea ambiguita': l'atleta non sa se deve inserirlo autonomamente o meno.
    proposta: >
      Se si decide di mantenerlo (vedi S1), aggiungere esplicitamente l'esercizio nella lista con
      serie, reps, peso e la nota condizionale. Se si decide di rimuoverlo, togliere il riferimento
      dal titolo del giorno e dalla nota del French press.

  - id: "S3"
    descrizione: "Band pull-apart e' tecnicamente un'abduzione orizzontale della spalla sotto carico"
    motivazione: >
      La lista degli esercizi vietati include 'qualsiasi esercizio con abduzione orizzontale spalla
      sotto carico'. Il band pull-apart prevede esattamente questo movimento, seppur con elastico leggero.
      In contesto riabilitativo TOS e' comunemente usato come esercizio compensatorio, ma formalmente
      contraddice il vincolo. Il face pull, anch'esso incluso, prevede un componente simile ma e'
      esplicitamente approvato nel piano.
    proposta: >
      Valutare con il fisioterapista se il band pull-apart a carico leggero e' sicuro. In alternativa,
      sostituire con un esercizio di retrazione scapolare pura senza abduzione orizzontale (es. scapular
      squeeze isometrico, prone Y-raise a corpo libero con ROM limitato).

  - id: "S4"
    descrizione: "Progressione hip thrust da 70 a 80 kg (+14%) in una settimana e' aggressiva per un rientro"
    motivazione: >
      Un aumento del 14% in una settimana e' elevato per una fase di recupero dove il principio guida
      e' la prudenza. Gli altri esercizi progrediscono del 5-9%, coerentemente con il rientro graduale.
    proposta: >
      Ridurre il carico dell'hip thrust in S2 Giorno C a 75 kg (+7%) per mantenere la stessa logica
      conservativa di tutti gli altri movimenti della scheda.

punti_di_forza:
  - "Gestione infortunio TOS eccellente: note dettagliate, lista esercizi vietati chiara, istruzioni di stop immediato in caso di dolore, alternativa esplicita per ogni esercizio borderline."
  - "Calcolo percentuali preciso: 65% e 70% del 1RM calcolati correttamente su squat e stacco con arrotondamenti minimi e giustificati."
  - "Sessione di verifica RPE (Giorno C S2) molto intelligente: confrontare lo stesso carico a distanza di una settimana fornisce un dato oggettivo sull'adattamento senza rischi."
  - "Volume ridotto ma sufficiente per il rientro: 12 serie/settimana per quadricipiti e femorali e' adeguato per riattivazione senza sovraccaricare un atleta in deficit calorico dopo 3 settimane di stop."
  - "Struttura ramping sui compound principali (S1=leggero, S2=medio, S3=top set) ideale per il rientro: permette di valutare le sensazioni durante il warm-up prima di caricare."
  - "Lavoro compensatorio TOS ben strutturato: face pull, external rotation, wall angel, band pull-apart coprono tutti i muscoli antagonisti al piccolo pettorale (trapezio medio-inferiore, rotatori esterni, romboidi)."
  - "Note operative precise e actionable per ogni esercizio: l'atleta sa esattamente cosa fare senza ambiguita'."
  - "Durata stimata delle sessioni compatibile con il limite di 90 minuti."
