meta:
  atleta: "Daniele"
  data: "2026-03-19"
  periodo: "Marzo 2026 - Rientro TOS"
  tipo_fase: "Recupero da infortunio"
  durata_settimane: 2
  frequenza_settimanale: 3
  obiettivo: "Rientro graduale post-TOS senza stress al piccolo pettorale"
  note_infortunio: >
    Sindrome TOS da infiammazione/contrattura del piccolo pettorale. Atleta fermo 3 settimane,
    in via di guarigione. VIETATI: panca piana (qualsiasi variante), trazioni (qualsiasi presa),
    lat machine, military press, dip, overhead press, qualsiasi esercizio con abduzione
    orizzontale della spalla sotto carico. RPE massimo 7-8 su tutti i movimenti.
    Push-up stretti ammessi SOLO nella settimana 2 se COMPLETAMENTE indolore.

mesociclo:
  nome: "Rientro TOS - Fase 1"
  durata: "2 settimane"
  metodologia: >
    Allenamento 3 sessioni/settimana con struttura Lower + Upper compensatorio.
    Carichi conservativi al 65-75% 1RM su squat e stacco. Volume ridotto (3 serie/esercizio)
    per rispettare il deficit calorico e il decondizionamento da 3 settimane di stop.
    Lavoro compensatorio focalizzato su retrazione scapolare, rotatori esterni, dorsali
    con esercizi che NON coinvolgono il piccolo pettorale.
  frequenza: "3 sessioni/settimana"
  obiettivo: >
    Riattivazione neuromuscolare sicura, mantenimento della forza su squat e stacco,
    rinforzo dei muscoli antagonisti al piccolo pettorale per favorire la guarigione.
  logica:
    - "Settimana 1: carichi al 65-70% 1RM (RPE 6-7), tecnica prioritaria, volume minimo (3x5)"
    - "Settimana 2: carichi al 70-75% 1RM (RPE 7-8), progressione conservativa di 5 kg"
    - "Esercizi Upper limitati a rowing seduto con gomiti stretti, face pull, Y-W-T, curl, tricipiti cavi"
    - "Nessun esercizio che coinvolge il piccolo pettorale in nessuna delle 6 sessioni"
    - "Giorno C della settimana 2 e' una sessione di verifica RPE ai carichi della settimana 1"
    - "Volume settimanale ridotto rispetto al normale per rispettare deficit calorico -250 kcal"

riscaldamento:
  - "5 minuti cyclette o camminata a passo sostenuto (intensita' bassa)"
  - "Mobilita' anche: 10 Leg Swing avanti-indietro per lato + 10 rotazioni circolari per lato"
  - "Mobilita' caviglie: 10 ankle circles per lato + 10 dorsiflession wall stretch"
  - "Mobilita' spalle (SICURA): 10 wall angel lenti + 10 band pull-apart leggeri"
  - "Attivazione glutei: 15 clamshell con elastico + 10 ponte glutei a corpo libero"
  - "2 serie leggere (40-50% 1RM) del primo esercizio compound della sessione"

defaticamento:
  - "Stretching statico 30 secondi: quadricipiti, femorali, glutei, polpacci"
  - "Stretching spalle SICURO (no abduzione): petto con le braccia dietro la schiena NON eseguire"
  - "Stretching posteriore della spalla: braccio orizzontale tirato verso il petto con l'altra mano (sicuro per TOS)"
  - "Foam rolling: quadricipiti, femorali, polpacci, dorsali (evitare zona piccolo pettorale/clavicola)"
  - "5 minuti camminata leggera per abbassare la frequenza cardiaca"
  - "Respirazione diaframmatica: 5 respiri profondi in posizione supina per attivare il sistema parasimpatico"

note_generali:
  - "PRIORITA' ASSOLUTA: qualsiasi dolore al piccolo pettorale, alla spalla o al collo durante un esercizio = STOP immediato di quell'esercizio per la sessione."
  - "RPE massimo 7-8 su TUTTI gli esercizi. Non spingere oltre in nessuna sessione di questo mesociclo."
  - "Esercizi VIETATI per tutta la durata di questa scheda: panca piana (qualsiasi variante), trazioni (qualsiasi presa), lat machine (qualsiasi presa), military press, dip, overhead press, alzate laterali sopra 90 gradi, fly con manubri."
  - "Il rowing seduto va eseguito con gomiti STRETTI al corpo e retrazione scapolare controllata. Vietato il rowing ad ampio ROM con abduzione della spalla."
  - "Stacco da terra: eseguire con schiena neutra e attivazione core prima del tiro. Non superare RPE 7 nella settimana 1."
  - "Push-up stretti (S2 Giorno B): da eseguire SOLO se completamente indolore alla palpazione del piccolo pettorale. In caso di dubbio, sostituire con estensioni tricipiti al cavo."
  - "Deficit calorico moderato in corso (-250 kcal): energia limitata. Se la sessione sembra troppo impegnativa, ridurre 1 serie per esercizio piuttosto che aumentare i carichi."
  - "Proteine garantite a 192 g/giorno dalla dieta: il recupero muscolare e' supportato adeguatamente."
  - "Consultare il fisioterapista prima della settimana 4 (fase 1 completa) per valutare il reintegro progressivo."
  - "Progressione futura (dal mesociclo successivo, settimane 3-8 del piano): aumento graduale a 75-80% 1RM e reintegro controllato degli esercizi compound Upper."

settimane:
  - numero: 1
    intensita_target: "65-70% 1RM, RPE 6-7"
    note_settimana: >
      Prima settimana di rientro dopo 3 settimane di stop. Priorita' alla tecnica e alla
      riattivazione neuromuscolare. I carichi sembranno leggeri: e' intenzionale. Non aumentare
      il peso oltre quanto indicato. Registrare l'RPE percepito per ogni esercizio.
    giorni:
      - giorno: "Giorno A"
        tipo: "Lower Forza + Core"
        note_sessione: >
          Sessione incentrata su squat e stacco con carichi conservativi. Focus totale
          sulla tecnica. Nessun esercizio upper che coinvolga la spalla in modo attivo.
        esercizi:
          - nome: "Squat con bilanciere"
            serie: 3
            reps: "5"
            peso: "95 kg (65% 1RM)"
            recupero: "3 min"
            gruppo: "quadricipiti"
            principale: true
            note: "Ramping: S1=75 kg, S2=85 kg, S3=95 kg. Pausa 2 secondi in buca per tecnica."

          - nome: "Stacco da terra convenzionale"
            serie: 3
            reps: "4"
            peso: "130 kg (65% 1RM)"
            recupero: "3 min"
            gruppo: "femorali"
            principale: true
            note: "Ramping: S1=100 kg, S2=115 kg, S3=130 kg. Schiena neutra, attivare core prima del tiro."

          - nome: "Leg press"
            serie: 3
            reps: "10"
            peso: "110 kg"
            recupero: "2 min"
            gruppo: "quadricipiti"
            principale: false
            note: "Piedi alla larghezza spalle, no ROM completo se fastidio al ginocchio."

          - nome: "Leg curl sdraiato"
            serie: 3
            reps: "12"
            peso: "40 kg"
            recupero: "90 sec"
            gruppo: "femorali"
            principale: false
            note: "Movimento controllato, nessun rimbalzo in fase eccentrica."

          - nome: "Dead bug"
            serie: 3
            reps: "8"
            peso: "corpo libero"
            recupero: "60 sec"
            gruppo: "core"
            principale: false
            note: "8 ripetizioni per lato. Schiena incollata al pavimento durante tutto il movimento."

          - nome: "Plank"
            serie: 3
            reps: "30 sec"
            peso: "corpo libero"
            recupero: "60 sec"
            gruppo: "core"
            principale: false
            note: "Glutei attivi, non cedere in zona lombare. Progressione futura: 40-45 sec."

      - giorno: "Giorno B"
        tipo: "Upper Compensatorio - Schiena e Spalle Posteriori"
        note_sessione: >
          Sessione dedicata al lavoro compensatorio per il TOS. Tutti gli esercizi
          selezionati rinforzano i muscoli antagonisti al piccolo pettorale (dorsali
          con gomiti stretti, rotatori esterni, trapezio medio-inferiore) senza
          stressare il piccolo pettorale stesso. Eseguire i movimenti in modo
          controllato e con piena consapevolezza della posizione scapolare.
        esercizi:
          - nome: "Cable row presa neutra (cavo basso)"
            serie: 4
            reps: "10"
            peso: "55 kg"
            recupero: "2 min"
            gruppo: "dorsali"
            principale: true
            note: "FONDAMENTALE: gomiti STRETTI al corpo durante il tiro. Retrazione scapolare controllata. Vietato il ROM con abduzione della spalla."

          - nome: "Face pull al cavo"
            serie: 4
            reps: "15"
            peso: "20 kg"
            recupero: "90 sec"
            gruppo: "deltoidi posteriori"
            principale: true
            note: "Corda al livello degli occhi. Tirare verso il viso con rotazione esterna. Movimento lento e controllato. Esercizio chiave per il TOS."

          - nome: "External rotation al cavo basso (presa neutra)"
            serie: 3
            reps: "15"
            peso: "7 kg"
            recupero: "75 sec"
            gruppo: "cuffia dei rotatori"
            principale: true
            note: "Eseguire per entrambi i lati. Gomito a 90 gradi, incollato al fianco. Movimento di rotazione esterna puro. PRIORITARIO per la guarigione TOS."

          - nome: "Band pull-apart"
            serie: 3
            reps: "20"
            peso: "elastico leggero"
            recupero: "60 sec"
            gruppo: "deltoidi posteriori"
            principale: false
            note: "Braccia parallele al suolo, presa prona. Tirare fino a toccare le mani al petto. Retrazione scapolare massima alla fine del movimento."

          - nome: "Wall angel"
            serie: 3
            reps: "10"
            peso: "corpo libero"
            recupero: "60 sec"
            gruppo: "cuffia dei rotatori"
            principale: false
            note: "Schiena e testa a contatto con il muro. Movimento lento. Se c'e' dolore, ridurre il ROM."

          - nome: "Curl con bilanciere"
            serie: 3
            reps: "10"
            peso: "35 kg"
            recupero: "90 sec"
            gruppo: "bicipiti"
            principale: false
            note: "Gomiti fissi ai fianchi. Nessun rimbalzo nella posizione bassa."

          - nome: "French press con bilanciere ez"
            serie: 3
            reps: "12"
            peso: "30 kg"
            recupero: "90 sec"
            gruppo: "tricipiti"
            principale: false
            note: "Busto non coinvolto, solo avambracci si muovono. Alternativa sicura ai tricipiti al cavo se macchina non disponibile."

      - giorno: "Giorno C"
        tipo: "Lower Accessorio + Core + Spalle Posteriori Leggero"
        note_sessione: >
          Terza sessione della settimana: carichi inferiori al Giorno A, focus su
          volume accessorio e qualita' del movimento. Nessun squat o stacco pesante:
          gambe con esercizi mono-articolari e bilaterali leggeri. Breve sequenza
          compensatoria spalle a fine sessione.
        esercizi:
          - nome: "Bulgarian split squat"
            serie: 3
            reps: "8"
            peso: "20 kg (manubri)"
            recupero: "2 min"
            gruppo: "quadricipiti"
            principale: true
            note: "8 reps per gamba. Iniziare con il lato piu' debole. Busto eretto, ginocchio anteriore non supera la punta del piede."

          - nome: "Stacco rumeno"
            serie: 3
            reps: "10"
            peso: "70 kg"
            recupero: "2 min"
            gruppo: "femorali"
            principale: true
            note: "Carico conservativo per rientro. Schiena neutra, leggera flessione al ginocchio, cerniera all'anca. Sentire lo stiramento dei femorali."

          - nome: "Hip thrust con bilanciere"
            serie: 3
            reps: "12"
            peso: "70 kg"
            recupero: "90 sec"
            gruppo: "glutei"
            principale: false
            note: "Piedi alla larghezza dei fianchi. Contrazione glutei in alto per 1 secondo."

          - nome: "Leg extension"
            serie: 3
            reps: "12"
            peso: "45 kg"
            recupero: "90 sec"
            gruppo: "quadricipiti"
            principale: false
            note: "Movimento controllato sia in concentrica che eccentrica. Non iperestendere il ginocchio."

          - nome: "Face pull al cavo"
            serie: 3
            reps: "15"
            peso: "18 kg"
            recupero: "75 sec"
            gruppo: "deltoidi posteriori"
            principale: false
            note: "Ripetizione dell'esercizio chiave TOS. Peso leggermente inferiore al Giorno B per volume totale."

          - nome: "Ab wheel rollout"
            serie: 3
            reps: "8"
            peso: "corpo libero"
            recupero: "75 sec"
            gruppo: "core"
            principale: false
            note: "Iniziare con ROM parziale (30-45 gradi). Aumentare ROM solo se la zona lombare non cede."

  - numero: 2
    intensita_target: "70-75% 1RM, RPE 7-8"
    note_settimana: >
      Seconda settimana: aumento graduale dei carichi di 5 kg su squat e stacco.
      Il Giorno C e' una sessione di verifica RPE: si eseguono gli stessi esercizi
      del Giorno A della settimana 1 con i carichi della settimana 1 per valutare
      se l'RPE e' sceso (indice di adattamento positivo) o rimasto uguale/aumentato
      (segnale di recupero insufficiente). NON e' un test massimale.
    giorni:
      - giorno: "Giorno A"
        tipo: "Lower Forza + Core"
        note_sessione: >
          Stesse struttura della settimana 1, carico aumentato di 5 kg su squat e stacco.
          L'RPE atteso e' 7-7.5. Se percepito piu' alto, mantenere il carico della S1.
        esercizi:
          - nome: "Squat con bilanciere"
            serie: 3
            reps: "5"
            peso: "102 kg (70% 1RM)"
            recupero: "3 min"
            gruppo: "quadricipiti"
            principale: true
            note: "Ramping: S1=80 kg, S2=92 kg, S3=102 kg. Stesso focus tecnico della settimana 1."

          - nome: "Stacco da terra convenzionale"
            serie: 3
            reps: "4"
            peso: "140 kg (70% 1RM)"
            recupero: "3 min"
            gruppo: "femorali"
            principale: true
            note: "Ramping: S1=110 kg, S2=125 kg, S3=140 kg. Non superare RPE 8 sul top set."

          - nome: "Leg press"
            serie: 3
            reps: "10"
            peso: "120 kg"
            recupero: "2 min"
            gruppo: "quadricipiti"
            principale: false
            note: "Aumento di 10 kg rispetto alla settimana 1. Se RPE > 7, mantenere 110 kg."

          - nome: "Leg curl sdraiato"
            serie: 3
            reps: "12"
            peso: "42.5 kg"
            recupero: "90 sec"
            gruppo: "femorali"
            principale: false
            note: "Progressione minima (+2.5 kg). Qualita' del movimento prioritaria."

          - nome: "Dead bug"
            serie: 3
            reps: "10"
            peso: "corpo libero"
            recupero: "60 sec"
            gruppo: "core"
            principale: false
            note: "10 reps per lato. Progressione di volume (+2 reps/lato rispetto a S1)."

          - nome: "Plank"
            serie: 3
            reps: "40 sec"
            peso: "corpo libero"
            recupero: "60 sec"
            gruppo: "core"
            principale: false
            note: "Progressione da 30 a 40 secondi rispetto alla settimana 1."

      - giorno: "Giorno B"
        tipo: "Upper Compensatorio - Schiena e Spalle Posteriori"
        note_sessione: >
          Progressione dei carichi Upper di circa 2.5-5 kg. I push-up stretti sono rimandati
          alla prossima scheda (settimane 3-4) previa valutazione fisioterapica in settimana 4,
          come da piano approvato. Tricipiti al cavo in sostituzione.
        esercizi:
          - nome: "Cable row presa neutra (cavo basso)"
            serie: 4
            reps: "10"
            peso: "60 kg"
            recupero: "2 min"
            gruppo: "dorsali"
            principale: true
            note: "Progressione di 5 kg. Gomiti stretti al corpo, retrazione scapolare controllata."

          - nome: "Face pull al cavo"
            serie: 4
            reps: "15"
            peso: "22.5 kg"
            recupero: "90 sec"
            gruppo: "deltoidi posteriori"
            principale: true
            note: "Progressione di 2.5 kg. Mantenere la qualita' del movimento della settimana 1."

          - nome: "External rotation al cavo basso (presa neutra)"
            serie: 3
            reps: "15"
            peso: "8 kg"
            recupero: "75 sec"
            gruppo: "cuffia dei rotatori"
            principale: true
            note: "Progressione di 1 kg per lato. Movimento di rotazione esterna puro, senza compensazioni."

          - nome: "Band pull-apart"
            serie: 3
            reps: "20"
            peso: "elastico medio"
            recupero: "60 sec"
            gruppo: "deltoidi posteriori"
            principale: false
            note: "Passaggio da elastico leggero a medio. ATTENZIONE: tecnicamente prevede abduzione orizzontale della spalla — eseguire SOLO se completamente indolore. In caso di fastidio sostituire con scapular squeeze isometrico (3x10, 5 sec contrazione)."

          - nome: "Wall angel"
            serie: 3
            reps: "12"
            peso: "corpo libero"
            recupero: "60 sec"
            gruppo: "cuffia dei rotatori"
            principale: false
            note: "Progressione di 2 reps. Focus sul mantenimento del contatto con il muro."

          - nome: "Curl a martello con manubri"
            serie: 3
            reps: "10"
            peso: "18 kg (per manubrio)"
            recupero: "90 sec"
            gruppo: "bicipiti"
            principale: false
            note: "Variante al curl con bilanciere per lavorare anche il brachiale. Movimento alternato."

          - nome: "French press con bilanciere ez"
            serie: 3
            reps: "12"
            peso: "32.5 kg"
            recupero: "90 sec"
            gruppo: "tricipiti"
            principale: false
            note: "Progressione di 2.5 kg."

          - nome: "Tricipiti al cavo (pushdown)"
            serie: 3
            reps: "12"
            peso: "30 kg"
            recupero: "75 sec"
            gruppo: "tricipiti"
            principale: false
            note: "Sostituzione push-up stretti (rimandati a scheda successiva). Corda o barra dritta, gomiti fissi ai fianchi."

          - nome: "Plank"
            serie: 2
            reps: "40 sec"
            peso: "corpo libero"
            recupero: "60 sec"
            gruppo: "core"
            principale: false
            note: "Core di fine sessione. OPZIONALE: sostituire con dead bug se il Giorno A e' stato pesante."

      - giorno: "Giorno C"
        tipo: "Verifica RPE - Lower + Core (carichi settimana 1)"
        note_sessione: >
          Sessione di verifica: si ripetono gli esercizi principali del Giorno A
          con i CARICHI DELLA SETTIMANA 1 (squat 95 kg, stacco 130 kg).
          L'obiettivo non e' testare il massimale ma confrontare l'RPE percepito
          ora rispetto alla settimana 1. Un RPE inferiore di 1-1.5 punti indica
          un buon adattamento. Registrare i valori RPE dopo ogni serie.
          Aggiungere breve lavoro compensatorio spalle a fine sessione.
        esercizi:
          - nome: "Squat con bilanciere"
            serie: 3
            reps: "5"
            peso: "95 kg (65% 1RM - carico S1)"
            recupero: "3 min"
            gruppo: "quadricipiti"
            principale: true
            note: "VERIFICA RPE: stesso peso della settimana 1. Target RPE atteso: 5-6 (era 6-7 in S1). Registrare RPE di ogni serie."

          - nome: "Stacco da terra convenzionale"
            serie: 3
            reps: "4"
            peso: "130 kg (65% 1RM - carico S1)"
            recupero: "3 min"
            gruppo: "femorali"
            principale: true
            note: "VERIFICA RPE: stesso peso della settimana 1. Target RPE atteso: 5-6. Se RPE > 7, segnalare al coach: il recupero potrebbe essere insufficiente."

          - nome: "Stacco rumeno"
            serie: 3
            reps: "10"
            peso: "75 kg"
            recupero: "2 min"
            gruppo: "femorali"
            principale: false
            note: "Progressione di 5 kg rispetto al Giorno C S1. Qualita' del movimento prioritaria."

          - nome: "Hip thrust con bilanciere"
            serie: 3
            reps: "12"
            peso: "75 kg"
            recupero: "90 sec"
            gruppo: "glutei"
            principale: false
            note: "Progressione di 5 kg rispetto al Giorno C S1 (+7%, coerente con la logica conservativa del rientro)."

          - nome: "Face pull al cavo"
            serie: 3
            reps: "15"
            peso: "20 kg"
            recupero: "75 sec"
            gruppo: "deltoidi posteriori"
            principale: false
            note: "Esercizio TOS obbligatorio anche in questa sessione. Volume di mantenimento."

          - nome: "External rotation al cavo basso (presa neutra)"
            serie: 2
            reps: "15"
            peso: "8 kg"
            recupero: "75 sec"
            gruppo: "cuffia dei rotatori"
            principale: false
            note: "Breve rinforzo rotatori a fine sessione. 2 serie per non sovraccaricare il volume."

          - nome: "Plank"
            serie: 3
            reps: "40 sec"
            peso: "corpo libero"
            recupero: "60 sec"
            gruppo: "core"
            principale: false
            note: "Core di fine sessione."
