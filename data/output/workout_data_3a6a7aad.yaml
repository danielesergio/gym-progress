meta:
  titolo: "Scheda di Allenamento — Fase 0: Recupero TOS"
  data: "2026-03-21"
  tipo_fase: "Recupero / Ripresa Graduale"
  periodo: "2026-03 / 2026-04"
  durata_settimane: 2
  frequenza_settimanale: 3
  obiettivo: "Riprendere il movimento dopo 3 settimane di stop da Sindrome TOS. Mantenere forza su lower body e schiena neutra. ZERO sollecitazione del piccolo pettorale, spalla e movimenti overhead."

mesociclo:
  nome: "Recupero TOS — Fase 0"
  durata: "2 settimane"
  metodologia: "Allenamento adattato full lower + schiena neutra. Carichi al 60-65% 1RM, RPE massimo 7. Nessun esercizio che coinvolge pettorale, spalla in adduzione/abduzione, overhead o trazioni."
  frequenza: "3 sessioni/settimana"
  obiettivo: "Riprendere il pattern motorio dei compound lower body, mantenere la forza neurale, proteggere la guarigione della TOS."
  logica:
    - "FASE DI RECUPERO: la priorita' assoluta e' la guarigione del piccolo pettorale. Qualsiasi dolore a spalla/petto/collo = fine seduta immediata."
    - "Lower body e schiena neutra sono completamente liberi da coinvolgimento TOS: squat, stacco, leg press, stacco rumeno, core work."
    - "Il rematore con busto basso (non oltre 45 gradi) coinvolge la schiena senza caricare la spalla in posizioni pericolose — incluso in forma leggera."
    - "Carichi al 60-65% per permettere il riapprendimento del pattern motorio senza stress articolare eccessivo dopo 3 settimane di inattivita'."
    - "Nessun test massimali in questa fase: la forza verra' testata al termine della Fase 6 (Peaking), come da piano annuale."
    - "Volume moderato: 3 serie per esercizio principale. L'obiettivo non e' stimolare adattamenti massimali ma mantenere il segnale neurale e rientrare senza infortuni."
    - "Il rematore deve avere il busto a max 30-45 gradi: evita la posizione orizzontale che aumenta il carico sulla spalla e aggrava la TOS."

riscaldamento:
  - "5 min cyclette a bassa resistenza (RPE 3-4) — nessun movimento overhead"
  - "Mobilita' anche: world lunges 10 per lato, hip circle 10 per lato"
  - "Mobilita' caviglie: ankle circles 15 per lato, dorsiflession stretch 30s per lato"
  - "Mobilita' toracica: foam roller sulla colonna toracica 60s — non pressare la spalla"
  - "Attivazione glutei: glute bridge bodyweight 2x15"
  - "2 serie leggere (40% 1RM) del primo esercizio compound della sessione"

defaticamento:
  - "Stretching statico 30s per gruppo muscolare allenato (quadricipiti, femorali, glutei)"
  - "Stretching pettorale piccolo: corner stretch o doorway stretch 2x30s DELICATAMENTE senza dolore"
  - "Stretching mobilita' toracica: cat-cow 10 reps, foam roller toracico 60s"
  - "Foam rolling quadricipiti e femorali 60s per lato"
  - "5 min camminata leggera per abbassare la frequenza cardiaca"

note_generali:
  - "INFORTUNIO TOS ATTIVO: sono esclusi TUTTI gli esercizi che coinvolgono pettorale, spalla (adduzione/abduzione), overhead press, trazioni alla sbarra, dip, panca piana. Non fare eccezioni."
  - "Segnale di stop immediato: qualsiasi dolore, formicolio o sensazione anomala alla spalla/braccio/collo/petto = fine allenamento. Senza eccezioni."
  - "Massimali di riferimento per i calcoli percentuali: Squat 145.8 kg | Stacco 198.3 kg"
  - "60% 1RM Squat = ~87 kg | 65% 1RM Squat = ~95 kg"
  - "60% 1RM Stacco = ~119 kg | 65% 1RM Stacco = ~129 kg"
  - "RPE target massimo 7: devi sempre avere almeno 3 reps in riserva. Non andare mai vicino al cedimento."
  - "Il rematore con bilanciere va eseguito con busto a MAX 30-45 gradi dall'orizzontale. Busto piu' verticale = meno stress sulla spalla."
  - "Strategia nutrizionale fase 0: mantenimento calorico TDEE ~2870 kcal. NON fare deficit in questa fase — rallenta la guarigione e accelera il catabolismo muscolare. Proteine minimo 200g/die (2.3g/kg)."
  - "Fisioterapia raccomandata: almeno 3-4 sessioni per il piccolo pettorale e rinforzo stabilizzatori spalla (serratus anterior, trapezio inferiore, rotatori)."
  - "Omega-3 2-3g EPA+DHA/die per effetto anti-infiammatorio. Creatina monoidrato 5g/die (sicura anche durante il recupero)."
  - "Nessun Test Day in questa fase: i massimali vengono testati nella Fase 6 del piano annuale (Peaking), come pianificato."

settimane:
  - numero: 1
    intensita_target: "60% 1RM — RPE 6-7"
    note_settimana: "Settimana di reingresso. Carichi conservativi, focus sulla tecnica e sulla sensazione. Il corpo torna a muoversi dopo 3 settimane di stop: non forzare nulla."
    giorni:
      - giorno: "Lunedi"
        tipo: "Lower A — Squat Focus"
        note_sessione: "Prima sessione di rientro: tecnica prima di tutto. Se senti fastidio alla spalla durante il rematore o qualsiasi esercizio, salta quell'esercizio e segnalalo."
        esercizi:
          - nome: "squat con bilanciere"
            serie: 3
            reps: "5"
            peso: "87 kg (60% 1RM)"
            recupero: "3 min"
            gruppo: "Quadricipiti / Glutei"
            principale: true
          - nome: "stacco rumeno"
            serie: 3
            reps: "8"
            peso: "80 kg (40% 1RM stacco)"
            recupero: "2 min"
            gruppo: "Femorali / Glutei"
            principale: false
          - nome: "leg press"
            serie: 3
            reps: "10"
            peso: "120 kg"
            recupero: "2 min"
            gruppo: "Quadricipiti"
            principale: false
          - nome: "rematore con bilanciere"
            serie: 3
            reps: "8"
            peso: "60 kg (busto a 30-45 gradi, presa prona)"
            recupero: "2 min"
            gruppo: "Dorsali / Trapezi"
            principale: false
          - nome: "plank"
            serie: 3
            reps: "30 sec"
            peso: "corpo libero"
            recupero: "60 sec"
            gruppo: "Core"
            principale: false

      - giorno: "Mercoledi"
        tipo: "Lower B — Stacco Focus"
        note_sessione: "Focus sul pattern motorio dello stacco dopo 3 settimane di stop. Carichi molto conservativi per riabituare la catena posteriore."
        esercizi:
          - nome: "stacco da terra convenzionale"
            serie: 3
            reps: "5"
            peso: "119 kg (60% 1RM)"
            recupero: "3 min"
            gruppo: "Femorali / Glutei / Erettori"
            principale: true
          - nome: "leg press"
            serie: 3
            reps: "12"
            peso: "110 kg"
            recupero: "90 sec"
            gruppo: "Quadricipiti"
            principale: false
          - nome: "leg curl sdraiato"
            serie: 3
            reps: "10"
            peso: "RPE 6-7 (regola il macchinario)"
            recupero: "90 sec"
            gruppo: "Femorali"
            principale: false
          - nome: "face pull al cavo"
            serie: 3
            reps: "15"
            peso: "RPE 5-6 (carico molto leggero)"
            recupero: "60 sec"
            gruppo: "Deltoidi posteriori / Cuffia rotatori"
            principale: false
          - nome: "dead bug"
            serie: 3
            reps: "8 per lato"
            peso: "corpo libero"
            recupero: "60 sec"
            gruppo: "Core"
            principale: false

      - giorno: "Venerdi"
        tipo: "Lower C — Full Lower + Core"
        note_sessione: "Sessione mista per chiudere la settimana. Volume moderato, tecnica curata."
        esercizi:
          - nome: "squat con bilanciere"
            serie: 3
            reps: "6"
            peso: "85 kg (58% 1RM)"
            recupero: "3 min"
            gruppo: "Quadricipiti / Glutei"
            principale: true
          - nome: "stacco rumeno"
            serie: 3
            reps: "10"
            peso: "75 kg"
            recupero: "2 min"
            gruppo: "Femorali / Glutei"
            principale: false
          - nome: "cable row presa neutra (cavo basso)"
            serie: 3
            reps: "10"
            peso: "RPE 6 (busto eretto, presa neutra)"
            recupero: "90 sec"
            gruppo: "Dorsali / Trapezi"
            principale: false
          - nome: "ab wheel rollout"
            serie: 3
            reps: "8"
            peso: "corpo libero"
            recupero: "60 sec"
            gruppo: "Core"
            principale: false
          - nome: "calf raise in piedi"
            serie: 3
            reps: "15"
            peso: "60 kg (o macchinario RPE 6)"
            recupero: "60 sec"
            gruppo: "Polpacci"
            principale: false

  - numero: 2
    intensita_target: "65% 1RM — RPE 7"
    note_settimana: "Settimana di consolidamento. Aumento leggero dei carichi solo se la S1 e' andata bene SENZA alcun sintomo TOS. Se hai avuto fastidi alla spalla, mantieni i carichi della S1."
    giorni:
      - giorno: "Lunedi"
        tipo: "Lower A — Squat Focus"
        note_sessione: "Leggero aumento del carico rispetto alla settimana 1. Tecnica ancora prioritaria."
        esercizi:
          - nome: "squat con bilanciere"
            serie: 4
            reps: "4"
            peso: "95 kg (65% 1RM)"
            recupero: "3 min"
            gruppo: "Quadricipiti / Glutei"
            principale: true
          - nome: "stacco rumeno"
            serie: 3
            reps: "8"
            peso: "90 kg"
            recupero: "2 min"
            gruppo: "Femorali / Glutei"
            principale: false
          - nome: "leg press"
            serie: 3
            reps: "10"
            peso: "130 kg"
            recupero: "2 min"
            gruppo: "Quadricipiti"
            principale: false
          - nome: "rematore con bilanciere"
            serie: 3
            reps: "8"
            peso: "65 kg (busto a 30-45 gradi, presa prona)"
            recupero: "2 min"
            gruppo: "Dorsali / Trapezi"
            principale: false
          - nome: "plank"
            serie: 3
            reps: "40 sec"
            peso: "corpo libero"
            recupero: "60 sec"
            gruppo: "Core"
            principale: false

      - giorno: "Mercoledi"
        tipo: "Lower B — Stacco Focus"
        note_sessione: "Riportare lo stacco verso i carichi di lavoro normali in modo graduale. 65% e' ancora conservativo ma abbastanza da stimolare la catena posteriore."
        esercizi:
          - nome: "stacco da terra convenzionale"
            serie: 4
            reps: "4"
            peso: "129 kg (65% 1RM)"
            recupero: "3 min"
            gruppo: "Femorali / Glutei / Erettori"
            principale: true
          - nome: "leg press"
            serie: 3
            reps: "12"
            peso: "120 kg"
            recupero: "90 sec"
            gruppo: "Quadricipiti"
            principale: false
          - nome: "leg curl sdraiato"
            serie: 3
            reps: "10"
            peso: "RPE 7 (aggiungi un po' rispetto alla S1)"
            recupero: "90 sec"
            gruppo: "Femorali"
            principale: false
          - nome: "face pull al cavo"
            serie: 3
            reps: "15"
            peso: "RPE 6 (carico leggero, focalizzati sulla retrazione scapolare)"
            recupero: "60 sec"
            gruppo: "Deltoidi posteriori / Cuffia rotatori"
            principale: false
          - nome: "dead bug"
            serie: 3
            reps: "10 per lato"
            peso: "corpo libero"
            recupero: "60 sec"
            gruppo: "Core"
            principale: false

      - giorno: "Venerdi"
        tipo: "Lower C — Verifica Tecnica"
        note_sessione: "Sessione conclusiva della Fase 0. Valuta come ti senti. Se la TOS ha migliorato, sei pronto per la Fase 1. Se hai ancora sintomi, ripeti la Fase 0 per altri 3-5 giorni prima di procedere."
        esercizi:
          - nome: "squat con bilanciere"
            serie: 3
            reps: "5"
            peso: "92 kg (63% 1RM)"
            recupero: "3 min"
            gruppo: "Quadricipiti / Glutei"
            principale: true
          - nome: "stacco da terra convenzionale"
            serie: 3
            reps: "4"
            peso: "125 kg (63% 1RM)"
            recupero: "3 min"
            gruppo: "Femorali / Glutei / Erettori"
            principale: false
          - nome: "cable row presa neutra (cavo basso)"
            serie: 3
            reps: "10"
            peso: "RPE 7 (busto eretto)"
            recupero: "90 sec"
            gruppo: "Dorsali / Trapezi"
            principale: false
          - nome: "ab wheel rollout"
            serie: 3
            reps: "10"
            peso: "corpo libero"
            recupero: "60 sec"
            gruppo: "Core"
            principale: false
          - nome: "pallof press al cavo"
            serie: 3
            reps: "10 per lato"
            peso: "RPE 6"
            recupero: "60 sec"
            gruppo: "Core"
            principale: false
