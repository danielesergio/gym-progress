      - giorno: "Sabato"
        tipo: "TEST DAY — Valutazione Funzionale Mobilita' + Squat + Stacco"
        note_sessione: "NOTA: questo NON e' un test massimale. E' una valutazione funzionale. Obiettivo: verificare ROM scapolare completo, eseguire una singola squat a RPE 6-7 e una singola stacco a RPE 6-7 senza dolore. NO test panca — il piccolo pettorale non e' ancora autorizzato. Se compare dolore durante il Test Day: fermarsi immediatamente, la fase rehab si estende."
        protocolli:
          - nome: "Protocollo 1 — Valutazione Mobilita' Scapolare"
            target: "ROM completo in band pull-apart, wall slide e shoulder CARs senza compensi e senza dolore. Simmetria bilaterale."
            serie:
              - set: "Valutazione Band Pull-Apart"
                peso: "Elastico medio"
                reps: 20
                note: "Esegui 20 reps. Valuta: range completo? Dolore 0/10? Simmetria?"
                tentativo: false
              - set: "Valutazione Wall Slide"
                peso: "Bodyweight"
                reps: 12
                note: "Schiena al muro. ROM completo verso l'alto senza sollevare la schiena? Compensi? Dolore 0/10?"
                tentativo: false
              - set: "Valutazione Shoulder CARs"
                peso: "Bodyweight"
                reps: 6
                note: "6 rotazioni per lato. ROM massimo disponibile. Simmetria destra/sinistra. Dolore 0/10?"
                tentativo: true

          - nome: "Protocollo 2 — Squat Test Funzionale"
            target: "Singola squat a RPE 6-7 (~115-120 kg) senza dolore. Tecnica valutata. Non un test massimale."
            serie:
              - set: "Riscaldamento 1"
                peso: "60 kg"
                reps: 5
                note: "Riscaldamento leggero. Tecnica e mobilita' lombare."
                tentativo: false
              - set: "Riscaldamento 2"
                peso: "85 kg"
                reps: 3
                note: "Avvicinamento al peso di test."
                tentativo: false
              - set: "Riscaldamento 3"
                peso: "100 kg"
                reps: 2
                note: "Quasi al peso di test. Come ti senti?"
                tentativo: false
              - set: "Singola di Valutazione"
                peso: "115 kg"
                reps: 1
                note: "RPE target 6-7. Tecnica impeccabile. Dolore 0/10. Se RPE supera 8 o compare qualsiasi dolore alla spalla: fermarsi. Questo e' il Test: osserva profondita', posizione della schiena e stabilita' del core."
                tentativo: true

          - nome: "Protocollo 3 — Stacco Test Funzionale"
            target: "Singola stacco a RPE 6-7 (~155-165 kg) senza dolore. Tecnica valutata. Non un test massimale."
            serie:
              - set: "Riscaldamento 1"
                peso: "80 kg"
                reps: 5
                note: "Riscaldamento leggero. Impostazione posizione iniziale."
                tentativo: false
              - set: "Riscaldamento 2"
                peso: "120 kg"
                reps: 3
                note: "Avvicinamento al peso di test."
                tentativo: false
              - set: "Riscaldamento 3"
                peso: "145 kg"
                reps: 1
                note: "Quasi al peso di test."
                tentativo: false
              - set: "Singola di Valutazione"
                peso: "160 kg"
                reps: 1
                note: "RPE target 6-7. Tecnica impeccabile: schiena neutra, scapole retratte, spinta a terra con i piedi. Dolore 0/10. Se RPE supera 8 o compare qualsiasi dolore: fermarsi. Osserva: lockout completo, posizione della schiena, velocita' della sbarra."
                tentativo: true

          - nome: "Protocollo 4 — Valutazione Finale Cuffia Rotatori"
            target: "External rotation con elastico senza dolore e ROM simmetrico. Conferma criterio di avanzamento al mesociclo 2."
            serie:
              - set: "External Rotation Lato Destro"
                peso: "Elastico leggero-medio"
                reps: 15
                note: "ROM completo. Dolore 0/10."
                tentativo: false
              - set: "External Rotation Lato Sinistro"
                peso: "Elastico leggero-medio"
                reps: 15
                note: "ROM completo. Confronta con lato destro: simmetria? Se c'e' differenza significativa: segnala al fisioterapista."
                tentativo: true
        attivita_extra: []

