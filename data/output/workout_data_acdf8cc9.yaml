meta:
  titolo: "Rehab TOS Fase 1 — Recupero Attivo"
  data: "2026-03-23"
  tipo_fase: "Rehab"
  periodo: "2026-03 / 2026-04"
  durata_settimane: 5
  frequenza_settimanale: 3
  obiettivo: "Recuperare mobilita' e funzionalita' della spalla/piccolo pettorale. Mantenere forza residua con esercizi compatibili. Zero dolore come criterio guida."

diagnosi_programmazione:
  infortunio: "Sindrome TOS (Thoracic Outlet Syndrome) — probabile infiammazione e contrattura del piccolo pettorale. Fermo da 3 settimane, in fase di guarigione."
  dolore_iniziale: 0
  approccio_prime_settimane: "Nelle settimane 1-2 il piccolo pettorale non viene coinvolto in nessun esercizio. Si lavora esclusivamente su mobilita' scapolare attiva e rinforzo della cuffia dei rotatori con elastici e cavi leggeri. Squat e stacco con bilanciere sono permessi a RPE 5 (circa 65% 1RM) perche' non coinvolgono la struttura infortunata. Il criterio guida e' assenza totale di dolore: qualsiasi comparsa di fastidio al piccolo pettorale impone regressione immediata dell'esercizio o stop della sessione."
  strutture_da_evitare:
    - "piccolo pettorale"
    - "grande pettorale (trazioni, dip, panca in qualsiasi variante)"
    - "deltoide anteriore sotto carico overhead (military press, overhead press)"
    - "gran dorsale con trazione verticale (lat machine, trazioni)"
  varianti_scelte:
    - "Squat con bilanciere (permesso — non coinvolge piccolo pettorale)"
    - "Stacco da terra convenzionale (permesso — non coinvolge piccolo pettorale)"
    - "Leg press (supplemento squat se necessario)"
    - "Alzate laterali con manubri (permesse — nessun dolore riferito)"
    - "Alzate frontali con manubri (permesse — nessun dolore riferito)"
    - "Face pull con elastico o cavo basso (rinforzo cuffia rotatori)"
    - "Band pull-apart con elastico (mobilita' scapolare)"
    - "Wall slide (mobilita' scapolare)"
    - "External rotation con elastico (cuffia rotatori)"
    - "Shoulder CARs — Controlled Articular Rotations (mobilita' articolare)"
  uso_bfr: false
  note_fisioterapiche: "ATTENZIONE: il piccolo pettorale compresso nella TOS e' sensibile a qualsiasi esercizio che porta le braccia in adduzione orizzontale o in flessione con carico. Vietati categoricamente: panca piana (qualsiasi variante), trazioni, lat machine, military press, dip, croci con manubri o cavi. Il rematore con manubri a presa neutra e' da verificare con cautela (non previsto in questa fase). Se compare dolore su alzate laterali o frontali: ridurre il carico a 5 kg o eliminare. Consultare il fisioterapista di riferimento prima di introdurre qualsiasi variante non prevista in questa scheda."

criteri_passaggio:
  da_rehab_a_rampup:
    - "Dolore 0/10 al piccolo pettorale a riposo e durante tutti gli esercizi di questa scheda per almeno 1 settimana consecutiva (7 giorni)"
    - "Mobilita' scapolare ripristinata: range completo in band pull-apart, wall slide e shoulder CARs senza compensi (elevazione della spalla, inclinazione del tronco)"
    - "External rotation con elastico eseguita senza dolore e con ROM simmetrico bilateralmente"
    - "Squat e stacco completati a RPE 6-7 (settimane 4-5) senza dolore riferito durante e nelle 24h successive"
  da_rampup_ad_accumulo:
    - "Completato il Test Tecnico (settimana 5, sabato): squat singola RPE 6-7 e stacco singola RPE 6-7 senza dolore"
    - "Nessun fastidio nelle 24h successive a ogni sessione delle ultime 2 settimane"
    - "Mobilita' scapolare completamente ripristinata — confermata dal fisioterapista o dall'automonitoraggio con criteri sopra"
    - "Assenza di dolore al piccolo pettorale a riposo e sotto carico moderato per almeno 1 settimana consecutiva"

mesociclo:
  nome: "Rehab TOS Fase 1 — Recupero Attivo"
  durata: "5 settimane"
  metodologia: "Recupero dolore-guidato. Progressione dei carichi su squat e stacco condizionata all'assenza di dolore nelle 24h successive. Mobilita' scapolare e rinforzo cuffia rotatori obbligatori ogni sessione. Nessun esercizio che coinvolge il piccolo pettorale."
  frequenza: "3 sessioni/settimana — Lunedi, Mercoledi, Sabato"
  obiettivo: "Eliminare ogni dolore residuo, ripristinare la mobilita' scapolare completa, mantenere la forza su squat e stacco con progressione molto cauta"
  logica:
    - "S1-S2: adattamento iniziale — squat e stacco a RPE 5, mobilita' e cuffia ogni sessione, alzate laterali e frontali a 8 kg"
    - "S3-S4: progressione leggera — squat RPE 6, stacco RPE 6, alzate a 10 kg, stesso schema mobilita'"
    - "S5: consolidamento — sessioni 1-2 a RPE 6-7, ultima sessione (sabato) = TEST DAY funzionale su mobilita' + squat singola + stacco singola"

riscaldamento:
  - "5 min cardio leggero (cyclette o camminata sul tapis roulant)"
  - "Mobilita' articolare specifica spalla e scapola: 10 ripetizioni shoulder CARs per lato, 10 wall slide, 15 band pull-apart con elastico leggero"
  - "Attivazione cuffia rotatori: 15 external rotation con elastico per lato"
  - "2 serie di riscaldamento molto leggere del primo esercizio della sessione (50% del peso di lavoro)"

defaticamento:
  - "Stretching statico 45 secondi per quadricipiti, femorali, glutei e polpacci"
  - "Doorway stretch SOLO se non doloroso (senza forzare la posizione): 30 secondi per lato"
  - "Annotare livello di dolore al piccolo pettorale immediatamente dopo la sessione (scala 0-10)"
  - "Annotare livello di dolore nelle 24h successive (controllo mattina seguente)"
  - "Se dolore > 0/10 nelle 24h: non aumentare carico nella sessione successiva — mantieni o riduci"

note_generali:
  - "REGOLA DELLE 24 ORE: aumenta carico o volume SOLO se nelle 24 ore successive all'allenamento non si registrano fastidi, gonfiore o infiammazione al piccolo pettorale. In caso di risposta negativa: mantieni o riduci il carico."
  - "DOLORE DURANTE L'ESERCIZIO: se compare dolore > 0/10 su un qualsiasi esercizio che coinvolge la spalla, interrompi immediatamente l'esercizio. Non superare mai 2/10 su nessun esercizio."
  - "MAI cedimento muscolare in nessuna sessione. RPE massimo 7 (solo nelle ultime settimane su squat e stacco). RPE 5-6 nelle prime settimane."
  - "BEACH VOLLEY GIOVEDI': attivita' permessa ma monitora il dolore durante il gioco. Se il beach volley causa dolore alla spalla o al piccolo pettorale, sospendilo e consulta il fisioterapista."
  - "PRIORITA' ASSOLUTA: il recupero dal TOS ha la precedenza su qualsiasi obiettivo di performance. Se i criteri di passaggio non sono soddisfatti a fine settimana 5, la fase rehab si estende."
  - "AVVISO: la Sindrome TOS e' una condizione che puo' richiedere valutazione medica specialistica. Prima di modificare qualsiasi esercizio o aumentare il carico oltre quanto previsto, consultare il fisioterapista o il medico di riferimento."

settimane:
  - numero: 1
    intensita_target: "RPE 5 su squat e stacco — adattamento iniziale"
    note_settimana: "Prima settimana di rientro. Priorita' assoluta: zero dolore. Valuta la risposta del piccolo pettorale agli esercizi di mobilita' scapolare. Se alzate laterali o frontali causano dolore anche minimo, eliminarle e segnalare."
    palestra:
      - giorno: "Lunedi"
        tipo: "Rehab — Squat + Mobilita' Scapolare + Cuffia Rotatori"
        note_sessione: "Prima sessione post-infortunio. Carico squat conservativo. Monitora qualsiasi sensazione alla spalla durante e dopo. Dolore 0/10 su tutto."
        esercizi:
          - nome: "Squat con bilanciere"
            serie: 4
            reps: "4"
            peso: "95 kg"
            recupero: "3 min"
            gruppo: "Quadricipiti"
            principale: true
            tempo: "3-1-2"
            rpe: 5
            note: "65% 1RM (145.8 kg). Discesa controllata 3 secondi, pausa 1s in buca, risalita 2s. RPE target 5: deve sembrare facile. Fermarsi se compare qualsiasi dolore alla spalla."
          - nome: "Leg press"
            serie: 3
            reps: "10"
            peso: "120 kg"
            recupero: "2 min"
            gruppo: "Quadricipiti"
            principale: false
            tempo: "2-0-2"
            rpe: 4
            note: "Supplemento leggero. Focus su quadricipiti. Nessuno stress sulla spalla."
          - nome: "Leg curl sdraiato"
            serie: 3
            reps: "12"
            peso: "35 kg"
            recupero: "90 sec"
            gruppo: "Femorali"
            principale: false
            tempo: "2-0-2"
            rpe: 4
            note: "Femorali isolati. Nessuno stress sulla spalla."
          - nome: "Band pull-apart"
            serie: 3
            reps: "15"
            peso: "Elastico leggero"
            recupero: "60 sec"
            gruppo: "Deltoidi posteriori"
            principale: false
            tempo: "2-1-2"
            rpe: 2
            note: "Mobilita' scapolare. Braccia parallele al suolo, aprire lentamente. Dolore 0/10."
          - nome: "Wall slide"
            serie: 3
            reps: "10"
            peso: "Bodyweight"
            recupero: "60 sec"
            gruppo: "Cuffia dei rotatori"
            principale: false
            tempo: "3-1-3"
            rpe: 2
            note: "Schiena e braccia a contatto con il muro. Scivolare lentamente verso l'alto senza perdere il contatto. Se compare dolore: fermarsi e segnalare."
          - nome: "External rotation con elastico"
            serie: 3
            reps: "15"
            peso: "Elastico leggero"
            recupero: "60 sec"
            gruppo: "Cuffia dei rotatori"
            principale: false
            tempo: "2-1-2"
            rpe: 2
            note: "Gomito a 90 gradi, incollato al fianco. Rotazione esterna lenta. Eseguire per entrambi i lati. Dolore 0/10."
          - nome: "Alzate laterali con manubri"
            serie: 3
            reps: "15"
            peso: "8 kg"
            recupero: "90 sec"
            gruppo: "Deltoidi mediali"
            principale: false
            tempo: "2-1-2"
            rpe: 3
            note: "Controllo totale. Fermarsi a 90 gradi (parallelo al suolo). Se compare dolore anche minimo al piccolo pettorale: ridurre a 5 kg o eliminare l'esercizio."
          - nome: "Plank"
            serie: 3
            reps: "30s"
            peso: "Bodyweight"
            recupero: "60 sec"
            gruppo: "Core"
            principale: false
            tempo: "30s hold"
            rpe: 3
            note: "Core neutro. Nessuno stress sulla spalla se correttamente eseguito in posizione di appoggio sugli avambracci."
        attivita_extra: []

      - giorno: "Mercoledi"
        tipo: "Rehab — Stacco + Mobilita' Scapolare + Spalle Leggere"
        note_sessione: "Stacco conservativo. Stesso protocollo di monitoraggio del dolore. Alzate frontali al posto delle laterali oggi."
        esercizi:
          - nome: "Stacco da terra convenzionale"
            serie: 3
            reps: "3"
            peso: "130 kg"
            recupero: "3 min"
            gruppo: "Femorali"
            principale: true
            tempo: "2-0-1"
            rpe: 5
            note: "66% 1RM (198.3 kg). Tecnica pulita, schiena neutra. RPE 5: deve sembrare gestibile senza sforzo. Nessuno stress sulla spalla se la presa e' corretta."
          - nome: "Stacco rumeno"
            serie: 3
            reps: "8"
            peso: "70 kg"
            recupero: "2 min"
            gruppo: "Femorali"
            principale: false
            tempo: "3-1-1"
            rpe: 4
            note: "Complementare allo stacco. Discesa lenta, stop a meta' tibia. Rinforzo catena posteriore senza stress sulla spalla."
          - nome: "Shoulder CARs"
            serie: 2
            reps: "5"
            peso: "Bodyweight"
            recupero: "60 sec"
            gruppo: "Cuffia dei rotatori"
            principale: false
            tempo: "10s per ripetizione"
            rpe: 2
            note: "Controlled Articular Rotations. Rotazione lenta e controllata della spalla in tutto il range disponibile SENZA dolore. Se il ROM e' ridotto in qualche direzione: fermarsi in quel punto. 5 rotazioni per lato."
          - nome: "Band pull-apart"
            serie: 3
            reps: "15"
            peso: "Elastico leggero"
            recupero: "60 sec"
            gruppo: "Deltoidi posteriori"
            principale: false
            tempo: "2-1-2"
            rpe: 2
            note: "Come lunedi'. Mobilita' scapolare. Dolore 0/10."
          - nome: "External rotation con elastico"
            serie: 3
            reps: "15"
            peso: "Elastico leggero"
            recupero: "60 sec"
            gruppo: "Cuffia dei rotatori"
            principale: false
            tempo: "2-1-2"
            rpe: 2
            note: "Come lunedi'. Entrambi i lati. Dolore 0/10."
          - nome: "Alzate frontali con manubri"
            serie: 3
            reps: "15"
            peso: "8 kg"
            recupero: "90 sec"
            gruppo: "Deltoidi anteriori"
            principale: false
            tempo: "2-1-2"
            rpe: 3
            note: "Alzata fino a 90 gradi (parallelo al suolo). Nessun dondolio. Se compare dolore: ridurre a 5 kg o eliminare."
          - nome: "Dead bug"
            serie: 3
            reps: "8"
            peso: "Bodyweight"
            recupero: "60 sec"
            gruppo: "Core"
            principale: false
            tempo: "3-1-3"
            rpe: 3
            note: "Lombare incollata al suolo. Estendere braccio e gamba opposti lentamente. 8 ripetizioni per lato."
        attivita_extra: []

      - giorno: "Sabato"
        tipo: "Rehab — Squat + Stacco Leggero + Mobilita' + Tricipiti"
        note_sessione: "Sessione piu' completa della settimana. Volume basso, RPE conservativo. Tricipiti ai cavi senza stress sul pettorale."
        esercizi:
          - nome: "Squat con bilanciere"
            serie: 4
            reps: "4"
            peso: "95 kg"
            recupero: "3 min"
            gruppo: "Quadricipiti"
            principale: true
            tempo: "3-1-2"
            rpe: 5
            note: "Stesso carico di lunedi'. Valuta come ti senti rispetto a inizio settimana. Se va bene, segnalalo come feedback per aumentare a settimana 3."
          - nome: "Stacco da terra convenzionale"
            serie: 2
            reps: "3"
            peso: "130 kg"
            recupero: "3 min"
            gruppo: "Femorali"
            principale: true
            tempo: "2-0-1"
            rpe: 5
            note: "Volume ridotto rispetto a mercoledi' (2 serie invece di 3). Serve per valutare la risposta cumulativa della settimana."
          - nome: "Wall slide"
            serie: 3
            reps: "10"
            peso: "Bodyweight"
            recupero: "60 sec"
            gruppo: "Cuffia dei rotatori"
            principale: false
            tempo: "3-1-3"
            rpe: 2
            note: "Come lunedi'. Controlla il ROM rispetto all'inizio della settimana: sta migliorando?"
          - nome: "Shoulder CARs"
            serie: 2
            reps: "5"
            peso: "Bodyweight"
            recupero: "60 sec"
            gruppo: "Cuffia dei rotatori"
            principale: false
            tempo: "10s per ripetizione"
            rpe: 2
            note: "5 rotazioni per lato. Valuta il ROM disponibile."
          - nome: "Band pull-apart"
            serie: 3
            reps: "15"
            peso: "Elastico leggero"
            recupero: "60 sec"
            gruppo: "Deltoidi posteriori"
            principale: false
            tempo: "2-1-2"
            rpe: 2
            note: "Mobilita' scapolare. Dolore 0/10."
          - nome: "Face pull al cavo"
            serie: 3
            reps: "15"
            peso: "10 kg"
            recupero: "60 sec"
            gruppo: "Deltoidi posteriori"
            principale: false
            tempo: "2-1-2"
            rpe: 3
            note: "Cavo all'altezza degli occhi. Presa con corda, gomiti alti, tirare verso la faccia con rotazione esterna finale. Ottimo per la cuffia dei rotatori. Se compare dolore: ridurre peso o eliminare."
          - nome: "Pushdown al cavo (corda)"
            serie: 3
            reps: "12"
            peso: "15 kg"
            recupero: "75 sec"
            gruppo: "Tricipiti"
            principale: false
            tempo: "2-1-2"
            rpe: 4
            note: "Gomiti vicini al corpo e fissi. Nessun carico sul pettorale. Verifica assenza di dolore prima di eseguire."
          - nome: "Plank"
            serie: 3
            reps: "30s"
            peso: "Bodyweight"
            recupero: "60 sec"
            gruppo: "Core"
            principale: false
            tempo: "30s hold"
            rpe: 3
            note: "Appoggio sugli avambracci. Core stabile."
        attivita_extra: []

    attivita_extra:
      - giorno: "Giovedi"
        tipo: "sport"
        durata: "90 min"
        intensita: "media"
        note: "Beach Volley. Monitorare la spalla durante il gioco. Se compare dolore al piccolo pettorale durante i salti o i colpi: ridurre l'intensita' o sospendere e riferire."

  - numero: 2
    intensita_target: "RPE 5 su squat e stacco — consolidamento adattamento"
    note_settimana: "Se la settimana 1 ha dato risposta positiva (dolore 0/10 nelle 24h dopo ogni sessione): mantieni gli stessi carichi. Se c'e' stato dolore anche minimo: mantieni o riduci. NON aumentare i carichi questa settimana."
    palestra:
      - giorno: "Lunedi"
        tipo: "Rehab — Squat + Mobilita' Scapolare + Cuffia Rotatori"
        note_sessione: "Stessi carichi della settimana 1 se la risposta e' stata positiva. Aumenta la qualita' dell'esecuzione, non il peso."
        esercizi:
          - nome: "Squat con bilanciere"
            serie: 4
            reps: "4"
            peso: "95 kg"
            recupero: "3 min"
            gruppo: "Quadricipiti"
            principale: true
            tempo: "3-1-2"
            rpe: 5
            note: "Stesso carico S1. Tecnica impeccabile. Se RPE percepita scende a 4, segnalalo: a S3 si aumenta."
          - nome: "Leg press"
            serie: 3
            reps: "10"
            peso: "120 kg"
            recupero: "2 min"
            gruppo: "Quadricipiti"
            principale: false
            tempo: "2-0-2"
            rpe: 4
            note: "Supplemento leggero. Nessuno stress sulla spalla."
          - nome: "Leg curl sdraiato"
            serie: 3
            reps: "12"
            peso: "35 kg"
            recupero: "90 sec"
            gruppo: "Femorali"
            principale: false
            tempo: "2-0-2"
            rpe: 4
            note: "Stesso carico S1."
          - nome: "Alzate laterali con manubri"
            serie: 3
            reps: "15"
            peso: "8 kg"
            recupero: "90 sec"
            gruppo: "Deltoidi mediali"
            principale: false
            tempo: "2-1-2"
            rpe: 3
            note: "Stesso carico S1. Se S1 non ha causato dolore: procedi normalmente. Se ha causato anche minimo fastidio: elimina e riferisci."
          - nome: "Band pull-apart"
            serie: 3
            reps: "15"
            peso: "Elastico leggero"
            recupero: "60 sec"
            gruppo: "Deltoidi posteriori"
            principale: false
            tempo: "2-1-2"
            rpe: 2
            note: "Mobilita' scapolare. Valuta se il ROM e' migliorato rispetto a S1."
          - nome: "Wall slide"
            serie: 3
            reps: "10"
            peso: "Bodyweight"
            recupero: "60 sec"
            gruppo: "Cuffia dei rotatori"
            principale: false
            tempo: "3-1-3"
            rpe: 2
            note: "Controlla il ROM disponibile rispetto a S1."
          - nome: "External rotation con elastico"
            serie: 3
            reps: "15"
            peso: "Elastico leggero"
            recupero: "60 sec"
            gruppo: "Cuffia dei rotatori"
            principale: false
            tempo: "2-1-2"
            rpe: 2
            note: "Entrambi i lati. Valuta la simmetria del ROM."
          - nome: "Plank"
            serie: 3
            reps: "35s"
            peso: "Bodyweight"
            recupero: "60 sec"
            gruppo: "Core"
            principale: false
            tempo: "35s hold"
            rpe: 3
            note: "5 secondi in piu' rispetto a S1 — unica progressione di questa settimana."
        attivita_extra: []

      - giorno: "Mercoledi"
        tipo: "Rehab — Stacco + Mobilita' Scapolare + Spalle Leggere"
        note_sessione: "Stesso schema di mercoledi' S1. Mantenere qualita' di esecuzione alta."
        esercizi:
          - nome: "Stacco da terra convenzionale"
            serie: 3
            reps: "3"
            peso: "130 kg"
            recupero: "3 min"
            gruppo: "Femorali"
            principale: true
            tempo: "2-0-1"
            rpe: 5
            note: "Stesso carico S1. Tecnica impeccabile. Se RPE percepita scende a 4: segnalalo per aumentare a S3."
          - nome: "Stacco rumeno"
            serie: 3
            reps: "8"
            peso: "70 kg"
            recupero: "2 min"
            gruppo: "Femorali"
            principale: false
            tempo: "3-1-1"
            rpe: 4
            note: "Catena posteriore. Stesso carico S1."
          - nome: "Shoulder CARs"
            serie: 2
            reps: "5"
            peso: "Bodyweight"
            recupero: "60 sec"
            gruppo: "Cuffia dei rotatori"
            principale: false
            tempo: "10s per ripetizione"
            rpe: 2
            note: "5 rotazioni per lato. Cerca di ampliare il ROM rispetto a S1 solo SE non compare dolore."
          - nome: "Band pull-apart"
            serie: 3
            reps: "15"
            peso: "Elastico leggero"
            recupero: "60 sec"
            gruppo: "Deltoidi posteriori"
            principale: false
            tempo: "2-1-2"
            rpe: 2
            note: "Mobilita' scapolare. Dolore 0/10."
          - nome: "Alzate frontali con manubri"
            serie: 3
            reps: "15"
            peso: "8 kg"
            recupero: "90 sec"
            gruppo: "Deltoidi anteriori"
            principale: false
            tempo: "2-1-2"
            rpe: 3
            note: "Stesso carico S1. Se non ha causato dolore in S1: procedi normalmente."
          - nome: "External rotation con elastico"
            serie: 3
            reps: "15"
            peso: "Elastico leggero"
            recupero: "60 sec"
            gruppo: "Cuffia dei rotatori"
            principale: false
            tempo: "2-1-2"
            rpe: 2
            note: "Entrambi i lati. Dolore 0/10."
          - nome: "Dead bug"
            serie: 3
            reps: "8"
            peso: "Bodyweight"
            recupero: "60 sec"
            gruppo: "Core"
            principale: false
            tempo: "3-1-3"
            rpe: 3
